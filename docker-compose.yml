version: "3.9"

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SERVER_ENV: production
      SERVER_PORT: "8080"
      DATABASE_URL: jdbc:postgresql://postgres:5432/miku
      DATABASE_USERNAME: miku
      DATABASE_PASSWORD: ${DB_PASSWORD:-miku_secure_password}
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      EXTENSIONS_DIR: /app/extensions
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    volumes:
      - extensions:/app/extensions
      - server-data:/app/data
      - server-logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - miku-network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: miku
      POSTGRES_USER: miku
      POSTGRES_PASSWORD: ${DB_PASSWORD:-miku_secure_password}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U miku -d miku"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - miku-network
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-miku_redis_password} --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-miku_redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - miku-network
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  postgres-data:
  redis-data:
  extensions:
  server-data:
  server-logs:

networks:
  miku-network:
    driver: bridge
